<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>A3 - Assignment 3</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="nav-logo">
      <img src="file_00000000b938720787791f6a08345e9a.png" alt="Logo" width="150px">
    </div>

    <ul class="nav-links">
      <li><a href="#">About</a></li>
      <li><a href="#" class="active">Watch now</a></li>
      <li><a href="#">Actors</a></li>
      <li><a href="#">Contact</a></li>
    </ul>

    <div class="nav-right">
      <i class="ri-menu-3-line hamburger"></i>
    </div>
  </nav>

  <!-- SOCIAL RAIL -->
  <div class="social-rail">
    <a href="#"><i class="ri-twitter-x-line"></i></a>
    <a href="#"><i class="ri-instagram-line"></i></a>
    <a href="#"><i class="ri-facebook-line"></i></a>
  </div>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-watermark">GAME</div>
    <div class="hero-watermark-right">SQUID</div>
    <div class="scroll-indicator">SCROLL</div>

    <!-- LEFT -->
    <div class="hero-left">

      <div class="hero-logo fade-up">
        <div class="hero-logo-text">
          <img src="file_00000000b938720787791f6a08345e9a.png" alt="Logo" width="400px">
        </div>
      </div>

      <p class="hero-meta fade-up">
        Action / Thriller / Drama Series directed by Dong-hyuk Hwang<br>
        Season 1: 9 Episodes
      </p>

      <div class="hero-buttons fade-up">
        <a href="#" class="btn-play">
          <span class="play-icon"><i class="ri-play-fill"></i></span>
          Play Now
        </a>
        <a href="#" class="btn-trailer">
          <i class="ri-play-circle-line"></i>
          Watch Trailer
        </a>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="hero-right">
      <div class="character-wrap">
        <div class="character-glow"></div>
        <img
          src="ChatGPT Image May 10, 2026, 12_57_39 AM.png"
          alt="Squid Game Guard"
          class="character-img"
        />
      </div>
    </div>
  </section>

  <!-- CARDS STRIP -->
  <div class="cards-strip">

    <!-- Card 1 -->
    <div class="card">
      <img src="Card-1.png" alt="Guards trio"/>
      <div class="card-overlay"></div>
      <div class="card-footer">
        <span class="card-title">SERIES · <span class="pink">SQUID GAME</span></span>
        <span class="play-btn-sm"><i class="ri-play-fill"></i></span>
      </div>
    </div>

    <!-- Card 2 -->
    <div class="card">
      <img src="Card-2.jpg" alt="Masked guard"/>
      <div class="card-overlay"></div>
      <div class="card-footer">
        <span class="card-title">EPISODE <span class="pink">HIGHLIGHTS</span></span>
        <span class="play-btn-sm"><i class="ri-play-fill"></i></span>
      </div>
    </div>

    <!-- Card 3 -->
    <div class="card logo-card">
      <img src="Card-3.jpg" alt="Squid Game Logo"/>
      <div class="card-footer">
        <span class="card-title">SEASON <span class="pink">2 →</span></span>
        <span class="play-btn-sm"><i class="ri-play-fill"></i></span>
      </div>
    </div>

  </div>

</body>
</html>
